// ==UserScript==
// @name         京东去广告
// @description  移除京东开屏广告，精简我的页面产品推广。
// @author       RuCu6, Maasea
// @icon         https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/JD.png
// @update-time  2025-05-13 15:17:08
// ==/UserScript==

[rewrite_local]
# 1. 拦截 URL (原 URL-REGEX)
^http:\/\/\w{32}\.jddebug\.com\/diagnose\? url reject

# 2. basicConfig 字段修改 (原 Body Rewrite 的 jq 逻辑，此处转为 QX 响应体正则替换)
^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=basicConfig url response-body "isSocketEstablishedAhead":\s*(true|1|[1-9]) response-body "isSocketEstablishedAhead":0
^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=basicConfig url response-body "isSocketReport":\s*(true|1|[1-9]) response-body "isSocketReport":0
^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=basicConfig url response-body "httpdns":\s*(true|1|[1-9]) response-body "httpdns":0

# 3. 本地映射空字典 (原 Map Local 返回 {})
^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=(searchBoxWord|stationPullService|uniformRecommend[06]) url reject-dict

# 4. 移除京东广告主脚本 (原 Script)
^https:\/\/api\.m\.jd\.com\/client\.action\?functionId=(deliverLayer|getTabHomeInfo|myOrderInfo|orderTrackBusiness|personinfoBusiness|start|welcomeHome) url script-response-body https://kelee.one/Resource/JavaScript/JD/JD_remove_ads.js

[mitm]
hostname = api.m.jd.com